[project]
name = "nonebot-plugin-apex-api-query"
version = "26.5.19"
description = "Apex Legends API 查询插件，支持玩家数据、地图轮换、服务器状态和顶猎分数查询"
authors = [
    {name = "H-xiaoH",email = "a412454922@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.9,<4.0"
dependencies = [
    "nonebot2 (>=2.4.1)",
    "nonebot-adapter-onebot (>=2.4.6)",
    "nonebot-plugin-alconna (>=0.54.2)",
    "httpx (>=0.28.1)",
    "nonebot-plugin-orm (>=0.7.7)",
    "sqlalchemy (>=2.0.0)",
]
license = { text = "MIT" }

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[project.urls]
homepage = "https://github.com/H-xiaoH/nonebot-plugin-apex-api-query"
repository = "https://github.com/H-xiaoH/nonebot-plugin-apex-api-query"
documentation = "https://github.com/H-xiaoH/nonebot-plugin-apex-api-query/blob/main/README.md"
"Bug Tracker" = "https://github.com/H-xiaoH/nonebot-plugin-apex-api-query/issues"